<!DOCTYPE html>
<html>
<body style='margin:0;padding:10px;background:#f5f5f5;font-family:sans-serif'>
  <div id="recipes"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const data = JSON.parse(decodeURIComponent(params.get('data') || '[]'));
    const container = document.getElementById('recipes');
    data.forEach(r => {
      container.innerHTML += `
        <div style='background:white;border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)'>
          <img src='${r.image}' style='width:100%;height:180px;object-fit:cover'>
          <div style='padding:12px'>
            <p style='margin:0 0 8px 0;font-weight:bold'>${r.title}</p>
            <span style='background:#e8f5e9;color:#2e7d32;padding:4px 10px;border-radius:20px;font-size:13px'>${r.difficulty}</span>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
