<html>
<head>

</head>
<body style="margin:0;padding:10px;background:#f5f5f5;font-family:sans-serif">
  <div id="recipes"><p style="text-align:center;color:#999">Rezepte laden...</p></div>
  <script>
    const API_KEY = "DEIN_RAPIDAPI_KEY_HIER";
    const container = document.getElementById("recipes");

    async function loadRecipes() {
      const ids = [];
      while (ids.length < 10) {
        const id = Math.floor(Math.random() * 200) + 1;
        if (!ids.includes(id)) ids.push(id);
      }

      container.innerHTML = "";

      for (const id of ids) {
        try {
          const res = await fetch("https://the-vegan-recipes-db.p.rapidapi.com/" + id, {
            headers: {
              "x-rapidapi-key": "adf66655a7mshd3f3cf2b2cc0d46p105c1ejsn59ac9fe14412",
              "x-rapidapi-host": "the-vegan-recipes-db.p.rapidapi.com"
            }
          });
          const r = await res.json();
          container.innerHTML += `
            <div style="background:white;border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
              <img src="${r.image}" style="width:100%;height:180px;object-fit:cover">
              <div style="padding:12px">
                <p style="margin:0 0 8px 0;font-weight:bold;font-size:15px">${r.title}</p>
                <span style="background:#e8f5e9;color:#2e7d32;padding:4px 10px;border-radius:20px;font-size:13px">${r.difficulty}</span>
              </div>
            </div>`;
        } catch(e) {}
      }
    }

    loadRecipes();
  </script>
